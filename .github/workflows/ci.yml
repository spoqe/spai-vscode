# Minimal YAML wrapper — all logic in ci.clj
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup babashka
        uses: turtlequeue/setup-babashka@v1.5.0
        with:
          babashka-version: 1.3.186

      - name: Run baci pipeline
        run: bb .github/ci.clj run

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: spai-vsix
          path: "*.vsix"
